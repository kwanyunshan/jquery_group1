<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kedai Buah</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h2>Kalkulator Mudah Kedai Buah</h2>
    <p>Harga sekilo (RM) :</p>
    <input type="number" class="harga">
    <br>
    <br>  
    <p>Berat Buah (kg) :</p>
    <input type="number" class="berat">
    <br>
    <br>
    <button class="kira">Kira</button>
    <h3 class="hasil"></h3>

    <script>
        $(document).ready(function(){
            $(".kira").click(function(){
                var harga=$(".harga").val();
                var berat=$(".berat").val();
                var jumlah=harga*berat;
                $(".hasil").text("Jumlah Bayaran: RM"+jumlah.toFixed(2));
            })
        })
    </script>


</body>
</html>
